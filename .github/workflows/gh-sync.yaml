# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: gh-sync
on:
  schedule:
    - cron: "0 18 * * *" # daily at 03:00 JST
  workflow_dispatch:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: gh-sync
  cancel-in-progress: true

jobs:
  gh-sync:
    name: drift-issue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write # create and update drift-tracking issues
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: naa0yama/gh-sync@e667e77f406fbc2d45c604886234e95ab59b5e67 # v0.3.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          upstream-manifest: naa0yama/boilerplate-rust@main:.github/gh-sync/config.yaml
          install-only: "true"

      - name: Sync drift issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh-sync issue-sync \
            --manifest .github/gh-sync/config.yaml \
            --upstream-manifest naa0yama/boilerplate-rust@main:.github/gh-sync/config.yaml
