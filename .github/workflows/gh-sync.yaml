# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: gh-sync check
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 18 * * *" # daily at 03:00 JST
  workflow_dispatch:

permissions: {}

concurrency:
  group: gh-sync-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  gh-sync-check:
    name: gh-sync-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: naa0yama/gh-sync@93c2233ddf30c32021dd373d677d2575798f5eac # v0.1.3 # zizmor: ignore[unpinned-uses]
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          upstream-manifest: naa0yama/boilerplate-rust@main:.github/gh-sync/config.yaml
