---
changelog:
  exclude:
    labels:
      - ignore-for-release
      - tagpr

  categories:
    - title: Features 🎉
      labels: ["enhancement"]
    - title: Bug Fixes 🐌
      labels: ["bug"]
    - title: Documentation 🗒️
      labels: ["documentation"]
    - title: "Dependency Updates 📦"
      labels: ["renovate"]
      exclude:
        labels:
          [
            "manager:mise",
            "manager:github-actions",
            "manager:dockerfile",
            "manager:regex",
            "github-actions",
            "core",
            "renovate-config",
          ]
    - title: "Development Environment 🔧"
      labels:
        [
          "manager:mise",
          "manager:github-actions",
          "manager:dockerfile",
          "manager:regex",
          "github-actions",
          "core",
          "renovate-config",
        ]
    - title: Other Changes
      labels: ["*"]
